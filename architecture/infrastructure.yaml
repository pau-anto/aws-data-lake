# Infrastructure de base du data lake

AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Infrastructure Data Lake AWS - Groupe 4
  Crée les buckets S3 (Raw, Processed, Curated) avec
  versioning et sécurité de base.

# PARAMETERS — les paramètres pour personnaliser le déploiement

Parameters:

  ProjectName:
    Type: String
    Default: datalake
    Description: Nom du projet, utilisé dans le nommage des ressources

  Environment:
    Type: String
    Default: dev
    Description: Environnement (dev, prod...)

  GroupName:
    Type: String
    Default: groupe1
    Description: Nom du groupe, pour rendre les noms de buckets uniques

# RESOURCES — les ressources AWS à créer (buckets S3, IAM Roles, etc.)

Resources:

  # ----------------------------------------------------------
  # BUCKET S3 — stockage des données à différents stades de traitement
  # ----------------------------------------------------------

  # BUCKET RAW
  # Reçoit les données brutes telles qu'elles sont ingérées
  # Ne doit jamais être modifié après ingestion

  RawBucket:
    Type: AWS::S3::Bucket
    Properties:
      # Le nom combine les paramètres définis au-dessus
      # !Sub permet de remplacer les variables dans la chaîne de caractères par leurs valeurs réelles lors du déploiement
      BucketName: !Sub '${ProjectName}-raw-${Environment}-${GroupName}'
      
      # Versioning : conserve l'historique de chaque fichier
      VersioningConfiguration:
        Status: Enabled
      
      # Bloque tout accès public — les données ne sont accessibles que par les services AWS autorisés (IAM)
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # BUCKET PROCESSED
  # Reçoit les données nettoyées et converties en Parquet par le Glue ETL Job

  ProcessedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-processed-${Environment}-${GroupName}'
      
      VersioningConfiguration:
        Status: Enabled
      
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # BUCKET CURATED
  # Reçoit les données partitionnées, prêtes pour Athena

  CuratedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-curated-${Environment}-${GroupName}'
      
      VersioningConfiguration:
        Status: Enabled
      
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ATHENA RESULTS BUCKET
  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-athena-results-${Environment}-${GroupName}'
      
      # Les résultats des requêtes Athena sont temporaires
      VersioningConfiguration:
        Status: Suspended
      
      # Nettoyage automatique des résultats après 30 jours
      LifecycleConfiguration:
        Rules:
          - Id: CleanupAthenaResults
            Status: Enabled
            ExpirationInDays: 30

      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

# OUTPUTS — affiche les infos utiles après le déploiement

Outputs:

  RawBucketName:
    Description: Nom du bucket Raw
    Value: !Ref RawBucket

  ProcessedBucketName:
    Description: Nom du bucket Processed
    Value: !Ref ProcessedBucket

  CuratedBucketName:
    Description: Nom du bucket Curated
    Value: !Ref CuratedBucket
    
  AthenaResultsBucketName:
    Description: Nom du bucket pour les résultats Athena
    Value: !Ref AthenaResultsBucket